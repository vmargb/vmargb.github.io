name: Generate Atom feed

on:
  push:
    branches: [main]
    paths:
      - "blog.html"    # only run when blog changes changes
      - "generate_atom.py"   # or if script is changed
  workflow_dispatch: {} # trigger manually from the Actions tab

# so the workflow can push the updated atom.xml back to the repo
permissions:
  contents: write

jobs:
  build-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate atom.xml
        run: python3 generate_atom.py

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add atom.xml
          if git diff --cached --quiet; then
            echo "atom.xml unchanged, nothing to commit."
          else
            git commit -m "chore: regenerate atom.xml [skip ci]"
            git push
          fi
